<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Verbatim Studio</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; margin: 0;
      background: #f9fafb; color: #374151;
    }
    .msg { text-align: center; font-size: 14px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="msg" id="msg">Requesting microphone access...</div>
  <script>
    (async () => {
      const msg = document.getElementById('msg');
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        stream.getTracks().forEach(t => t.stop());
        msg.textContent = 'Microphone access granted!';
        chrome.runtime.sendMessage({ type: 'MIC_PERMISSION_GRANTED' });
        setTimeout(() => window.close(), 800);
      } catch (err) {
        msg.textContent = 'Microphone access was denied. You can re-enable it by clicking the lock icon in your address bar.';
        msg.style.color = '#dc2626';
      }
    })();
  </script>
</body>
</html>
